<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — StayAwake</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">
    <span class="nav-logo-dot"></span>
    StayAwake
  </div>
  <div class="nav-right">
    <span class="nav-email" id="user-email"></span>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Log out</button>
  </div>
</nav>

<div class="dash-layout">

  <!-- Header -->
  <div class="dash-header">
    <div>
      <p class="dash-greeting">Dashboard</p>
      <h1 class="dash-title">Your monitored sites</h1>
    </div>
  </div>

  <!-- Stats row -->
  <div class="dash-stats" id="dash-stats">
    <div class="stat-card">
      <div class="stat-icon">🌐</div>
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-lbl">Total sites</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🟢</div>
      <div class="stat-val" id="stat-active">—</div>
      <div class="stat-lbl">Active</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⏸</div>
      <div class="stat-val" id="stat-paused">—</div>
      <div class="stat-lbl">Paused</div>
    </div>
  </div>

  <!-- Add site form -->
  <div class="add-card">
    <div class="add-card-title">
      <span class="add-title-icon">+</span>
      Add a site to keep awake
    </div>

    <div class="add-row">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Site URL</label>
        <input class="form-input" type="url" id="new-url" placeholder="https://your-app.onrender.com"/>
      </div>

      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Ping every (minutes)</label>
        <input class="form-input" type="number" id="new-interval" placeholder="e.g. 10" min="1" max="1440"/>
      </div>

      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">&nbsp;</label>
        <button class="btn btn-gold" id="add-btn" onclick="addSite()">Add Site</button>
      </div>
    </div>

    <p class="form-error" id="add-error" style="margin-top:10px"></p>
  </div>

  <!-- Sites list -->
  <p class="sites-section-title">Monitored sites</p>
  <div class="sites-list" id="sites-list">
    <p style="color:var(--text3);font-size:14px;padding:8px 4px">Loading your sites…</p>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
